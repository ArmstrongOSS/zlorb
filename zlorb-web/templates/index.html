<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>{{ title }}</title>
</head>
<body>
    <h1>Zlorb</h1>

    <h2>Repos Watched</h2>
    {% if let Some(repos_list) = repos %}
        <ul>
            {% for repo in repos_list %}
                <li>{{ repo }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No repositories found.</p>
    {% endif %}

    <!-- Load HTMX script (HTMX ships its own bundle) -->
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
</body>
</html>
